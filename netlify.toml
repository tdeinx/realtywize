# Realtywize — Netlify configuration

[build]
  publish = "."
  functions = "netlify/functions"

# Environment variables required by serverless functions.
# The empty string here documents that they must exist; the actual
# values must be set in the Netlify dashboard under
# Site Settings → Environment Variables — never hardcoded here.
[build.environment]
  SUPABASE_SERVICE_ROLE_KEY = ""

# Pretty URLs: /app serves app/index.html automatically.
# Explicit redirect kept for clarity and to handle /app/ too.
[[redirects]]
  from = "/app"
  to = "/app/index.html"
  status = 200

[[redirects]]
  from = "/app/"
  to = "/app/index.html"
  status = 200

# Security + caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
